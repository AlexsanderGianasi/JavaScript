<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Países</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <link
      rel="shortcut icon"
      href="https://static.vecteezy.com/system/resources/previews/046/352/995/non_2x/world-map-3d-illustration-free-png.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <div id="container">
      <h1 id="title">Países</h1>
      <p id="more">Descubra informações sobre os seus países favoritos!</p>
      <div id="content">
        <p id="select">Selecione um país:</p>
        <select id="country-select">
          <option value="argentina">Argentina</option>
          <option value="australia">Austrália</option>
          <option value="brasil">Brasil</option>
          <option value="canada">Canadá</option>
          <option value="china">China</option>
          <option value="coreia_do_sul">Coreia do Sul</option>
          <option value="espanha">Espanha</option>
          <option value="estados_unidos">Estados Unidos</option>
          <option value="franca">França</option>
          <option value="italia">Itália</option>
          <option value="japao">Japão</option>
          <option value="mexico">México</option>
          <option value="portugal">Portugal</option>
          <option value="reino_unido">Reino Unido</option>
        </select>
        <button id="btn">Ver Informações</button>
      </div>
    </div>
    <div id="country-info">
    </div>
  </body>
</html>
